services:
  postgres:
    image: postgres:15-alpine
    container_name: alfredo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: alfredo_user
      POSTGRES_PASSWORD: alfredo_password
      POSTGRES_DB: alfredo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: alfredo_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@alfredo.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  dashboard:
    build: .
    container_name: alfredo_dashboard
    command: streamlit run ui/dashboard.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true --server.maxUploadSize=2000 --server.fileWatcherType=none
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - PYTHONPATH=/app
      - HEADROOM_PROXY_URL=http://headroom_proxy:8787/v1
      - DATABASE_URL=postgresql://alfredo_user:alfredo_password@postgres:5432/alfredo_db
    volumes:
      - ./db:/app/db
      - ./workspace:/app/workspace
      - ./storage:/app/storage
      - ./ui:/app/ui
      - ./core:/app/core
      - ./tools:/app/tools
      - ./config:/app/config
      - ./.env:/app/.env
    restart: unless-stopped
    depends_on:
      - postgres
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  api:
    build: .
    container_name: alfredo_api
    command: python -c "from core.api_server import start_api_server; start_api_server()"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - HEADROOM_PROXY_URL=http://headroom_proxy:8787/v1
      - DATABASE_URL=postgresql://alfredo_user:alfredo_password@postgres:5432/alfredo_db
    volumes:
      - ./db:/app/db
      - ./workspace:/app/workspace
      - ./storage:/app/storage
      - ./ui:/app/ui
      - ./core:/app/core
      - ./tools:/app/tools
      - ./config:/app/config
      - ./sdk:/app/sdk
      - ./.env:/app/.env
    restart: unless-stopped
    depends_on:
      - postgres

  headroom_proxy:
    build: .
    container_name: alfredo_headroom_proxy
    command: headroom proxy --port 8787 --host 0.0.0.0
    ports:
      - "8787:8787"
    env_file:
      - .env
    volumes:
      - ./db:/app/db
      - ./workspace:/app/workspace
    restart: unless-stopped

volumes:
  postgres_data:
