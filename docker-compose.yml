services:
  dashboard:
    build: .
    container_name: alfredo_dashboard
    command: streamlit run ui/dashboard.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true --server.maxUploadSize=2000
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - PYTHONPATH=/app
      - HEADROOM_PROXY_URL=http://headroom_proxy:8787/v1
    volumes:
      - ./db:/app/db
      - ./workspace:/app/workspace
      - ./storage:/app/storage
      - ./ui:/app/ui
      - ./core:/app/core
      - ./config:/app/config
      - ./.env:/app/.env
    restart: unless-stopped

  api:
    build: .
    container_name: alfredo_api
    command: python -c "from core.api_server import start_api_server; start_api_server()"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - HEADROOM_PROXY_URL=http://headroom_proxy:8787/v1
    volumes:
      - ./db:/app/db
      - ./workspace:/app/workspace
      - ./storage:/app/storage
      - ./ui:/app/ui
      - ./core:/app/core
      - ./config:/app/config
      - ./sdk:/app/sdk
      - ./.env:/app/.env
    restart: unless-stopped

  headroom_proxy:
    build: .
    container_name: alfredo_headroom_proxy
    command: headroom proxy --port 8787 --host 0.0.0.0
    ports:
      - "8787:8787"
    env_file:
      - .env
    volumes:
      - ./db:/app/db
      - ./workspace:/app/workspace
    restart: unless-stopped
