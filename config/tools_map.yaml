tools_registry:
  read_file:
    display_name: "Local: Read File (Workspace)"
    description: "Allows agents to read files inside the agent's workspace/ folder."
    required_secrets: []
  write_file:
    display_name: "Local: Write File (Workspace)"
    description: "Allows agents to create and modify files inside the agent's workspace/ folder."
    required_secrets: []
  read_file_anywhere:
    display_name: "Local: Read Any File (Full PC)"
    description: "Reads any text file at any location on the computer. Read-only — no modifications allowed."
    required_secrets: []
  search_files:
    display_name: "Local: Search Files (Full PC)"
    description: "Searches for files by name or pattern across the entire computer. Search-only, no modifications."
    required_secrets: []
  search_web:
    display_name: "Web: DuckDuckGo Search"
    description: "Performs free web searches via DuckDuckGo."
    required_secrets: []
  execute_shell_command:
    display_name: "Local: Terminal Executor"
    description: "Executes safe commands in the OS terminal (active blacklist enforced)."
    required_secrets: []
  ask_operator:
    display_name: "Local: Ask Operator"
    description: "Allows the agent to pause and ask the operator a question via Telegram in case of ambiguity."
    required_secrets: []
  create_word_document:
    display_name: "Office: Create Word Document (.docx)"
    description: "Creates a Word file with a title and content. Requires Telegram confirmation before creating."
    required_secrets: []
  edit_word_document:
    display_name: "Office: Edit Word Document (.docx)"
    description: "Edits an existing Word file. Shows a preview and requires Telegram confirmation."
    required_secrets: []
  create_excel_document:
    display_name: "Office: Create Excel Spreadsheet (.xlsx)"
    description: "Creates an Excel file with headers and data rows. Requires Telegram confirmation."
    required_secrets: []
  take_screenshot:
    display_name: "Local: Take Screenshot"
    description: "Captures a screenshot of the monitor and sends it to the operator via Telegram."
    required_secrets: []
  manage_email:
    display_name: "Email: Outlook Manager (Read/Send)"
    description: "Reads, searches, and sends emails via Outlook SMTP/IMAP. Sending requires Telegram confirmation."
    required_secrets:
      - OUTLOOK_EMAIL
      - OUTLOOK_APP_PASSWORD
      - OUTLOOK_IMAP_SERVER
      - OUTLOOK_SMTP_SERVER
  vector_search:
    display_name: "Local: Vector Database Search"
    description: "Queries a local vector database to retrieve context from uploaded documents."
    required_secrets: []
  calculator:
    display_name: "Local: Calculator Tool"
    description: "Evaluates mathematical expressions safely (supports +, -, *, /, sqrt, log, etc.)."
    required_secrets: []
  file_read_tool:
    display_name: "Code: File Reader (.py only)"
    description: "Reads Python code from a .py file physically located in the project root."
    required_secrets: []
  file_write_tool:
    display_name: "Code: File Writer (.py only)"
    description: "Saves Python code physically in the project as a .py file."
    required_secrets: []
  python_repl_tool:
    display_name: "Code: Python REPL (Compile/Run)"
    description: "Executes Python code in a subprocess to test syntax, compile, and verify imports."
    required_secrets: []


