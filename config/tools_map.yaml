tools_registry:
  read_file:
    display_name: "Local: Read File (Workspace)"
    description: "Allows agents to read files inside the agent's workspace/ folder."
    required_secrets: []

  write_file:
    display_name: "Local: Write File (Workspace)"
    description: "Allows agents to write files inside the agent's workspace/ folder. Overwrites existing files."
    required_secrets: []

  write_python_file:
    display_name: "Code: Write Python File (Project)"
    description: "Allows agents to write .py scripts to the project. Use with caution."
    required_secrets: []

  create_word_document:
    display_name: "Office: Create Word Document"
    description: "Creates a new Word (.docx) document in the workspace. Requires human confirmation."
    required_secrets: []

  edit_word_document:
    display_name: "Office: Edit Word Document"
    description: "Edits an existing Word (.docx) document in the workspace. Requires human confirmation."
    required_secrets: []

  create_excel_document:
    display_name: "Office: Create Excel Document"
    description: "Creates a new Excel (.xlsx) document in the workspace. Requires human confirmation."
    required_secrets: []


  read_file_anywhere:
    display_name: "Local: Read Any File (Full PC)"
    description: "Reads any text file at any location on the computer. Read-only — no modifications allowed."
    required_secrets: []
  search_files:
    display_name: "Local: Search Files (Full PC)"
    description: "Searches for files by name or pattern across the entire computer. Search-only, no modifications."
    required_secrets: []
  search_web:
    display_name: "Web: DuckDuckGo Search"
    description: "Performs free web searches via DuckDuckGo."
    required_secrets: []
  execute_shell_command:
    display_name: "Local: Terminal Executor"
    description: "Executes safe commands in the OS terminal (active blacklist enforced)."
    required_secrets: []
  ask_operator:
    display_name: "Local: Ask Operator"
    description: "Allows the agent to pause and ask the operator a question via Telegram in case of ambiguity."
    required_secrets: []

  take_screenshot:
    display_name: "Local: Take Screenshot"
    description: "Captures a screenshot of the monitor and sends it to the operator via Telegram."
    required_secrets: []
  manage_email:
    display_name: "Email: Outlook Reader (Read/Search Only)"
    description: "Reads and searches emails via Outlook IMAP. Sending is handled by Master AI as an export option."
    required_secrets:
      - OUTLOOK_EMAIL
      - OUTLOOK_APP_PASSWORD
      - OUTLOOK_IMAP_SERVER
      - OUTLOOK_SMTP_SERVER
  vector_search:
    display_name: "Local: Vector Database Search"
    description: "Queries a local vector database to retrieve context from uploaded documents."
    required_secrets: []
  calculator:
    display_name: "Local: Calculator Tool"
    description: "Evaluates mathematical expressions safely (supports +, -, *, /, sqrt, log, etc.)."
    required_secrets: []

  python_repl_tool:
    display_name: "Code: Python REPL (Compile/Run)"
    description: "Executes Python code in a subprocess to test syntax, compile, and verify imports."
    required_secrets: []

  app_database_query:
    display_name: "App: Query Database"
    description: "Queries the database of a connected external app (SQLite or PostgreSQL). Available only in app workflows."
    required_secrets: []
    category: "app_integration"

  app_api_caller:
    display_name: "App: Call REST API"
    description: "Calls REST API endpoints of a connected external app. Available only in app workflows."
    required_secrets: []
    category: "app_integration"


  merge_and_save_data:
    display_name: "Local: Thermo Excel DB Writer"
    description: "Merges thermodynamic property data and saves it to an Excel database."
    required_secrets: []

  read_rag_chunks:
    display_name: "RAG: Read RAG Chunks (Paginated)"
    description: "Reads RAG vector database chunks linearly with offset and limit pagination."
    required_secrets: []

  trigger_next_batch:
    display_name: "Workflow: Trigger Next Batch"
    description: "Triggers the next batch of an autonomous workflow with updated offset and context."
    required_secrets: []